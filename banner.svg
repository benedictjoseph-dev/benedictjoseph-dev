<svg width="100%" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <style>
      .dot { animation: float linear infinite; opacity: 0; }
      .line { stroke-opacity: 0; animation: fadeline ease-in-out infinite; }
      @keyframes float {
        0%   { opacity: 0; transform: translate(0, 0); }
        10%  { opacity: 1; }
        90%  { opacity: 1; }
        100% { opacity: 0; transform: translate(var(--tx), var(--ty)); }
      }
      @keyframes fadeline {
        0%, 100% { stroke-opacity: 0; }
        50% { stroke-opacity: 0.18; }
      }
      .name {
        font-family: 'Segoe UI', Arial, sans-serif;
        font-size: 32px;
        font-weight: 600;
        fill: #ffffff;
        letter-spacing: 2px;
      }
      .role {
        font-family: 'Segoe UI', Arial, sans-serif;
        font-size: 13px;
        font-weight: 400;
        fill: #7ee8fa;
        letter-spacing: 5px;
      }
      .cursor {
        animation: blink 1s step-end infinite;
        fill: #7ee8fa;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  </defs>

  <rect width="900" height="160" fill="url(#bg)" rx="12"/>

  <!-- connecting lines -->
  <line class="line" x1="80" y1="30" x2="200" y2="90" stroke="#7ee8fa" stroke-width="0.5" style="animation-duration:4s; animation-delay:0s"/>
  <line class="line" x1="200" y1="90" x2="310" y2="40" stroke="#a78bfa" stroke-width="0.5" style="animation-duration:5s; animation-delay:0.5s"/>
  <line class="line" x1="310" y1="40" x2="420" y2="120" stroke="#7ee8fa" stroke-width="0.5" style="animation-duration:4.5s; animation-delay:1s"/>
  <line class="line" x1="700" y1="50" x2="800" y2="110" stroke="#a78bfa" stroke-width="0.5" style="animation-duration:5s; animation-delay:0.2s"/>
  <line class="line" x1="800" y1="110" x2="860" y2="30" stroke="#7ee8fa" stroke-width="0.5" style="animation-duration:4s; animation-delay:1.2s"/>
  <line class="line" x1="60" y1="120" x2="200" y2="90" stroke="#a78bfa" stroke-width="0.5" style="animation-duration:6s; animation-delay:0.8s"/>
  <line class="line" x1="700" y1="50" x2="620" y2="130" stroke="#7ee8fa" stroke-width="0.5" style="animation-duration:5.5s; animation-delay:0.3s"/>

  <!-- particles left cluster -->
  <circle class="dot" cx="80" cy="30" r="1.8" fill="#7ee8fa" style="--tx:8px; --ty:-12px; animation-duration:6s; animation-delay:0s"/>
  <circle class="dot" cx="200" cy="90" r="1.4" fill="#a78bfa" style="--tx:-6px; --ty:10px; animation-duration:5s; animation-delay:0.4s"/>
  <circle class="dot" cx="310" cy="40" r="1.6" fill="#7ee8fa" style="--tx:10px; --ty:8px; animation-duration:7s; animation-delay:0.8s"/>
  <circle class="dot" cx="60" cy="120" r="1.2" fill="#a78bfa" style="--tx:-8px; --ty:-6px; animation-duration:5.5s; animation-delay:1.2s"/>
  <circle class="dot" cx="150" cy="140" r="1.5" fill="#7ee8fa" style="--tx:6px; --ty:-10px; animation-duration:6.5s; animation-delay:0.2s"/>
  <circle class="dot" cx="40" cy="65" r="1.0" fill="#a78bfa" style="--tx:-4px; --ty:8px; animation-duration:4.5s; animation-delay:1.5s"/>
  <circle class="dot" cx="260" cy="130" r="1.3" fill="#7ee8fa" style="--tx:8px; --ty:-4px; animation-duration:5s; animation-delay:0.6s"/>
  <circle class="dot" cx="420" cy="120" r="1.6" fill="#a78bfa" style="--tx:-6px; --ty:6px; animation-duration:6s; animation-delay:0.9s"/>

  <!-- particles right cluster -->
  <circle class="dot" cx="700" cy="50" r="1.8" fill="#7ee8fa" style="--tx:-8px; --ty:10px; animation-duration:5.5s; animation-delay:0.3s"/>
  <circle class="dot" cx="800" cy="110" r="1.4" fill="#a78bfa" style="--tx:6px; --ty:-8px; animation-duration:6s; animation-delay:0.7s"/>
  <circle class="dot" cx="860" cy="30" r="1.6" fill="#7ee8fa" style="--tx:-10px; --ty:6px; animation-duration:4.5s; animation-delay:1.1s"/>
  <circle class="dot" cx="620" cy="130" r="1.2" fill="#a78bfa" style="--tx:8px; --ty:-10px; animation-duration:7s; animation-delay:0s"/>
  <circle class="dot" cx="750" cy="145" r="1.5" fill="#7ee8fa" style="--tx:-6px; --ty:-6px; animation-duration:5s; animation-delay:1.4s"/>
  <circle class="dot" cx="880" cy="90" r="1.0" fill="#a78bfa" style="--tx:4px; --ty:8px; animation-duration:6.5s; animation-delay:0.5s"/>
  <circle class="dot" cx="660" cy="25" r="1.3" fill="#7ee8fa" style="--tx:-4px; --ty:10px; animation-duration:5.5s; animation-delay:1.0s"/>
  <circle class="dot" cx="830" cy="55" r="1.6" fill="#a78bfa" style="--tx:6px; --ty:-8px; animation-duration:4s; animation-delay:0.2s"/>

  <!-- centered text -->
  <text x="450" y="88" text-anchor="middle" class="name">Benedict Joseph</text>
  <text x="450" y="116" text-anchor="middle" class="role">UNITY GAME DEVELOPER</text>
  <rect class="cursor" x="608" y="103" width="2" height="14" rx="1"/>
</svg>
